name: CI

# Intégration continue Flutter — 100% gratuit, aucun secret requis.
# À chaque push/PR : analyse statique, tests, puis build d'un APK téléchargeable.
on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:        # bouton "Run workflow" dans l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Java 17 (compatible Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable        # dernier Flutter stable (Dart compatible >=3.4.3)

      - name: Installer les dépendances
        run: flutter pub get

      - name: Analyse statique (informatif, non bloquant)
        run: flutter analyze
        continue-on-error: true

      - name: Tests (non bloquant)
        run: |
          if [ -d "test" ]; then flutter test || true; else echo "Aucun dossier test/ — étape ignorée."; fi
        continue-on-error: true

      - name: Préparer Android (utiliser le NDK par défaut du runner)
        run: |
          sed -i '/ndkVersion/d' android/app/build.gradle 2>/dev/null || true
          echo "ndkVersion retiré (le cas échéant) pour éviter un téléchargement de NDK épinglé."

      - name: Build de l'APK (best-effort, non bloquant)
        run: flutter build apk --release
        continue-on-error: true

      - name: Publier l'APK (si le build a réussi)
        if: ${{ hashFiles('build/app/outputs/flutter-apk/app-release.apk') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: cvtech-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
