name: CI

# Intégration continue Flutter — 100% gratuit, aucun secret requis.
# À chaque push/PR : analyse statique, tests, puis build d'un APK téléchargeable.
on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:        # bouton "Run workflow" dans l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Java 17 (compatible Gradle/Android)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable        # dernier Flutter stable (Dart compatible >=3.4.3)

      - name: Installer les dépendances
        run: flutter pub get

      - name: Analyse statique (informatif, non bloquant)
        run: flutter analyze
        continue-on-error: true

      - name: Tests (non bloquant)
        run: |
          if [ -d "test" ]; then flutter test || true; else echo "Aucun dossier test/ — étape ignorée."; fi
        continue-on-error: true

      - name: Build de l'APK (release, signé avec la clé debug)
        run: flutter build apk --release

      - name: Publier l'APK (artefact téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: cvtech-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
