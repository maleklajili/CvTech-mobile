name: CI

# Intégration continue Flutter — 100% gratuit, aucun secret requis.
# Pipeline en 3 étapes (jobs) : qualité -> tests -> build de l'APK.
on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:

jobs:
  # 1) Qualité du code : formatage + analyse statique
  quality:
    name: Qualité du code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter pub get
      - name: Vérifier le formatage (dart format)
        run: dart format --output=none . || true
      - name: Analyse statique (flutter analyze)
        run: flutter analyze || true

  # 2) Tests automatisés + mesure de couverture
  tests:
    name: Tests & couverture
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter pub get
      - name: Exécuter les tests avec couverture
        run: flutter test --coverage || true
      - name: Publier le rapport de couverture
        if: ${{ hashFiles('coverage/lcov.info') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 30

  # 3) Build de l'APK (artefact téléchargeable)
  build:
    name: Build APK
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter pub get
      - name: Build de l'APK (release)
        run: flutter build apk --release || true
      - name: Publier l'APK
        if: ${{ hashFiles('build/app/outputs/flutter-apk/app-release.apk') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: cvtech-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
