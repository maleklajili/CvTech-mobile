name: Release

# "Déploiement" gratuit : sur un tag de version (ex. v1.0.0), on construit l'APK
# et on le publie dans une GitHub Release (page de téléchargement publique).
# Aucun compte payant, aucun secret externe : utilise le GITHUB_TOKEN automatique.
on:
  push:
    tags: [ "v*.*.*" ]
  workflow_dispatch:

permissions:
  contents: write           # nécessaire pour créer la Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable        # dernier Flutter stable (Dart compatible >=3.4.3)

      - name: Installer les dépendances
        run: flutter pub get

      - name: Build de l'APK (release)
        run: flutter build apk --release

      - name: Renommer l'APK avec le numéro de version
        run: mv build/app/outputs/flutter-apk/app-release.apk "cvtech-${{ github.ref_name }}.apk"

      - name: Créer la Release GitHub avec l'APK
        uses: softprops/action-gh-release@v2
        with:
          files: cvtech-*.apk
          generate_release_notes: true
